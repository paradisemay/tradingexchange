services:
  api-mock:
    build: .
    container_name: tradingexchange-api-mock
    env_file:
      - path: .env
        required: false
    environment:
      API_MOCK_PORT: 8081
      QUOTE_INTERVAL_MS: ${QUOTE_INTERVAL_MS:-1000}
      MOCK_JWT: ${MOCK_JWT:-mock-access-token}
      MOCK_REFRESH_TOKEN: ${MOCK_REFRESH_TOKEN:-mock-refresh-token}
      MOCK_REFRESH_TOKEN_ROTATED: ${MOCK_REFRESH_TOKEN_ROTATED:-mock-refresh-token-rotated}
    ports:
      - "${API_MOCK_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8081/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
