server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail-positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: telemetry-files
    static_configs:
      - targets: [localhost]
        labels:
          job: telemetry-files
          __path__: /var/log/telemetry/*.log
