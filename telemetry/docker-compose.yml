services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: telemetry-otel-collector
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./otel-collector/otel-collector.yml:/etc/otelcol/config.yml:ro
    ports:
      - "${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"
      - "${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318"
      - "${OTEL_COLLECTOR_PROMETHEUS_PORT:-8889}:8889"
      - "${OTEL_COLLECTOR_HEALTH_PORT:-13133}:13133"
    networks:
      - telemetry-net

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: telemetry-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - otel-collector
    networks:
      - telemetry-net

  loki:
    image: grafana/loki:3.3.2
    container_name: telemetry-loki
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    networks:
      - telemetry-net

  tempo:
    image: grafana/tempo:2.6.1
    container_name: telemetry-tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "${TEMPO_HTTP_PORT:-3200}:3200"
    networks:
      - telemetry-net

  promtail:
    image: grafana/promtail:3.3.2
    container_name: telemetry-promtail
    command: ["-config.file=/etc/promtail/promtail.yml"]
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - ./logs:/var/log/telemetry:ro
      - promtail_positions:/tmp
    depends_on:
      - loki
    networks:
      - telemetry-net

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: telemetry-redis-exporter
    environment:
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_EXPORTER_PORT:-9121}:9121"
    networks:
      - telemetry-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: telemetry-postgres-exporter
    environment:
      DATA_SOURCE_NAME: ${POSTGRES_EXPORTER_DSN:-postgresql://broker_app:change-me@postgres:5432/broker?sslmode=disable}
    ports:
      - "${POSTGRES_EXPORTER_PORT:-9187}:9187"
    networks:
      - telemetry-net

  grafana:
    image: grafana/grafana:11.5.1
    container_name: telemetry-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - telemetry-net

volumes:
  grafana_data:
  loki_data:
  prometheus_data:
  tempo_data:
  promtail_positions:

networks:
  telemetry-net:
    driver: bridge
