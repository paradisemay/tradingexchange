services:
  postgres:
    image: postgres:16
    container_name: broker-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-broker}
      POSTGRES_USER: ${POSTGRES_USER:-broker_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-broker_app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-broker_app}", "-d", "${POSTGRES_DB:-broker}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - broker-net

  redis:
    image: redis:7-alpine
    container_name: broker-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 512mb
      --maxmemory-policy volatile-ttl
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - broker-net

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: broker-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - broker-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: broker-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-broker_app}:${POSTGRES_PASSWORD:-broker_app}@postgres:5432/${POSTGRES_DB:-broker}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - broker-net

  ktor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: broker-ktor
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - broker-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  redis_data:

networks:
  broker-net:
    driver: bridge
