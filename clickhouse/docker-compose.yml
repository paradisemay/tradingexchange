services:
  clickhouse:
    image: ${CLICKHOUSE_IMAGE:-clickhouse/clickhouse-server:25.3-alpine}
    container_name: ${CLICKHOUSE_CONTAINER_NAME:-tradingexchange-clickhouse}
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-trading}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-trading_app}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
      CLICKHOUSE_MAX_MEMORY_USAGE: ${CLICKHOUSE_MAX_MEMORY_USAGE:-10000000000}
      CLICKHOUSE_MAX_THREADS: ${CLICKHOUSE_MAX_THREADS:-8}
    ports:
      - "127.0.0.1:${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "127.0.0.1:${CLICKHOUSE_TCP_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./sql:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "clickhouse-client --host 127.0.0.1 --port 9000 --user \"$${CLICKHOUSE_USER}\" --password \"$${CLICKHOUSE_PASSWORD}\" --query 'SELECT 1'",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - clickhouse-net

volumes:
  clickhouse_data:

networks:
  clickhouse-net:
    driver: bridge

